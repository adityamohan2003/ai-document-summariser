<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Summariser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #6c63ff, #48d1cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #aaaaaa;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #1a1a2e;
            border: 1px solid #6c63ff;
            border-radius: 12px;
            padding: 20px;
            color: #ffffff;
            font-size: 1rem;
            resize: vertical;
            outline: none;
        }

        textarea::placeholder {
            color: #666;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #6c63ff, #48d1cc);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 40px;
            background: #1a1a2e;
            border: 1px solid #6c63ff;
            border-radius: 12px;
            padding: 30px;
            display: none;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 0.95rem;
            color: #dddddd;
        }

        .loading {
            margin-top: 20px;
            text-align: center;
            color: #6c63ff;
            display: none;
            font-size: 1rem;
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #6c63ff;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>🤖 AI Document Summariser</h1>
    <p class="subtitle">Paste any text and get an instant AI-powered summary</p>

    <div class="container">
        <textarea id="inputText" placeholder="Paste your article, report, or any text here..."></textarea>
        <button id="summariseBtn" onclick="summarise()">✨ Summarise</button>

        <div class="loading" id="loading">⏳ Wait let it cook...</div>

        <div class="result-box" id="resultBox">
            <div class="result-title">📋 Analysis Results</div>
            <div id="resultText"></div>
        </div>
    </div>

    <script>
        async function summarise() {
            // Getting the text from the textarea
            const text = document.getElementById('inputText').value;

            if (!text.trim()) {
                alert('Please paste some text first!');
                return;
            }

            // Showing loading and disabling button
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('summariseBtn').disabled = true;

            try {
                // Sending text to our Flask backend
                const response = await fetch('/summarise', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                // Displaying the result
                document.getElementById('resultText').innerText = data.result;
                document.getElementById('resultBox').style.display = 'block';

            } catch (error) {
                alert('Something went wrong. Please try again.');
            } finally {
                // Hiding loading and enabling button
                document.getElementById('loading').style.display = 'none';
                document.getElementById('summariseBtn').disabled = false;
            }
        }
    </script>

</body>
</html>
